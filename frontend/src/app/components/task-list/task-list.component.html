<app-task-filter
  (filtersChanged)="applyFilters($event)">
</app-task-filter>

<app-task-form
  (taskCreated)="addTask($event)">
</app-task-form>

<hr>

<div class="task-list">

  <app-task-item
    *ngFor="let task of tasks"
    [task]="task"
    (delete)="deleteTask($event)"
    (toggleStatus)="toggleTaskStatus($event)">
  </app-task-item>

</div>
