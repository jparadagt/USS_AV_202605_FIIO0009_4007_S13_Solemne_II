<div class="task-report">

  <h2>
    Task Report
  </h2>

  <p>
    Total Tasks:
    <strong>{{ tasks.length }}</strong>
  </p>

  <p>
    Completed:
    <strong>{{ completedTasks }}</strong>
    ({{ completedPercentage }}%)
  </p>

  <p>
    Pending:
    <strong>{{ pendingTasks }}</strong>
    ({{ pendingPercentage }}%)
  </p>

</div>

<hr>
